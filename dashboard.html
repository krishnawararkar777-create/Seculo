<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Seculo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-serif { font-family: 'Playfair Display', serif; }
    .btn-primary {
      background: linear-gradient(135deg, #155dfd 0%, #6366f1 100%);
      transition: all 0.3s ease;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(21, 93, 253, 0.3); }
    .status-dot { animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body class="min-h-screen bg-[#0A0A0A] text-white">
  <nav class="w-full bg-[#0A0A0A] border-b border-white/10 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <span class="text-xl font-bold font-serif text-white tracking-tight">Seculo</span>
        <div class="h-6 w-px bg-white/10"></div>
        <div>
          <h1 class="text-xl font-bold tracking-tight text-white">Console</h1>
          <p id="user-email" class="text-[#155dfd] text-sm font-medium"></p>
        </div>
      </div>
      <button onclick="logout()" class="px-6 py-2 bg-[#1A1A1A] border border-white/10 text-gray-300 rounded-md hover:bg-[#222222] transition-all text-sm font-bold">
        Sign Out
      </button>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto p-6 md:p-12">
    <div id="loading" class="flex items-center justify-center py-20">
      <div class="w-10 h-10 border-4 border-white/10 border-t-[#155dfd] rounded-full animate-spin"></div>
    </div>

    <div id="dashboard-content" class="hidden">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="bg-[#111111] border border-white/10 p-8 rounded-xl shadow-sm">
          <h3 class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-4">Bot Status</h3>
          <div class="flex items-center gap-2">
            <div id="status-dot" class="w-2 h-2 bg-green-500 rounded-full status-dot"></div>
            <p id="bot-status" class="text-xl font-bold capitalize">Loading...</p>
          </div>
        </div>
        <div class="bg-[#111111] border border-white/10 p-8 rounded-xl shadow-sm">
          <h3 class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-4">Current Plan</h3>
          <p id="plan" class="text-xl font-bold capitalize">Loading...</p>
        </div>
        <div class="bg-[#111111] border border-white/10 p-8 rounded-xl shadow-sm">
          <h3 class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-4">WhatsApp</h3>
          <p id="whatsapp" class="text-xl font-bold">Loading...</p>
        </div>
      </div>

      <div class="bg-[#111111] border border-white/10 rounded-xl overflow-hidden shadow-sm mb-8">
        <div class="p-6 border-b border-white/10 bg-[#0A0A0A]/50">
          <h2 class="text-xl font-bold text-white">Bot Controls</h2>
        </div>
        <div class="p-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
          <button id="btn-start" onclick="startBot()" class="px-6 py-4 bg-green-500/10 border border-green-500/30 text-green-400 rounded-xl font-semibold hover:bg-green-500/20 transition-all">
            Start Bot
          </button>
          <button id="btn-stop" onclick="stopBot()" class="px-6 py-4 bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl font-semibold hover:bg-red-500/20 transition-all">
            Stop Bot
          </button>
          <button onclick="restartBot()" class="px-6 py-4 bg-[#155dfd]/10 border border-[#155dfd]/30 text-[#155dfd] rounded-xl font-semibold hover:bg-[#155dfd]/20 transition-all">
            Restart Bot
          </button>
          <button onclick="deleteBot()" class="px-6 py-4 bg-yellow-500/10 border border-yellow-500/30 text-yellow-400 rounded-xl font-semibold hover:bg-yellow-500/20 transition-all">
            Delete Bot
          </button>
        </div>
      </div>

      <div id="message" class="hidden p-4 rounded-xl mb-6"></div>

      <div class="bg-[#111111] border border-white/10 rounded-xl overflow-hidden shadow-sm">
        <div class="p-6 border-b border-white/10 bg-[#0A0A0A]/50">
          <h2 class="text-xl font-bold text-white">Quick Actions</h2>
        </div>
        <div class="p-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
          <a href="/onboarding" class="px-6 py-4 bg-[#1A1A1A] border border-white/10 text-gray-300 rounded-xl font-semibold hover:bg-[#222222] transition-all text-center">
            Edit Settings
          </a>
          <button onclick="getDashboardData()" class="px-6 py-4 bg-[#1A1A1A] border border-white/10 text-gray-300 rounded-xl font-semibold hover:bg-[#222222] transition-all">
            Refresh Data
          </button>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabaseUrl = 'https://lzkllxdyyoaclcfvlzfl.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6a2xseGR5eW9hY2xjZnZsemZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NTA0MDUsImV4cCI6MjA4OTMyNjQwNX0.Crmt3w2vIdWCLHtjNsOCmyvj_9zNmVCbFyJ7m6i2VV0';
    const supabase = createClient(supabaseUrl, supabaseAnonKey);

    let user = null;

    async function checkOnboardingStatus(userId) {
      try {
        const { data, error } = await supabase
          .from('users')
          .select('whatsapp_number')
          .eq('id', userId)
          .single();
        
        if (error || !data || !data.whatsapp_number) {
          return false;
        }
        return true;
      } catch {
        return false;
      }
    }

    async function checkAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      
      if (!session) {
        window.location.href = '/auth';
        return;
      }
      
      const hasOnboarded = await checkOnboardingStatus(session.user.id);
      if (!hasOnboarded) {
        window.location.href = '/onboarding';
        return;
      }
      
      user = session.user;
      document.getElementById('user-email').textContent = user.email;
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('dashboard-content').classList.remove('hidden');
      
      await getDashboardData();
    }

    async function getDashboardData() {
      try {
        const response = await fetch(`https://seculo-2.onrender.com/api/dashboard/${user.id}`);
        const data = await response.json();
        
        if (response.ok) {
          document.getElementById('bot-status').textContent = data.bot_status || 'unknown';
          document.getElementById('plan').textContent = data.plan || 'none';
          document.getElementById('whatsapp').textContent = data.whatsapp_number || 'not set';
          
          updateStatusDot(data.bot_status);
        } else {
          showMessage('Failed to load dashboard data', 'error');
        }
      } catch (error) {
        console.error('Error:', error);
      }
    }

    function updateStatusDot(status) {
      const dot = document.getElementById('status-dot');
      dot.className = 'w-2 h-2 rounded-full status-dot';
      
      if (status === 'running') {
        dot.classList.add('bg-green-500');
      } else if (status === 'stopped') {
        dot.classList.add('bg-yellow-500');
      } else {
        dot.classList.add('bg-gray-500');
      }
    }

    window.startBot = async function() {
      showMessage('Starting bot...', 'info');
      const response = await fetch('https://seculo-2.onrender.com/api/bot/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: user.id })
      });
      const result = await response.json();
      if (response.ok) {
        showMessage('Bot started successfully!', 'success');
        getDashboardData();
      } else {
        showMessage(result.error || 'Failed to start bot', 'error');
      }
    };

    window.stopBot = async function() {
      showMessage('Stopping bot...', 'info');
      const response = await fetch('https://seculo-2.onrender.com/api/bot/stop', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: user.id })
      });
      const result = await response.json();
      if (response.ok) {
        showMessage('Bot stopped successfully!', 'success');
        getDashboardData();
      } else {
        showMessage(result.error || 'Failed to stop bot', 'error');
      }
    };

    window.restartBot = async function() {
      showMessage('Restarting bot...', 'info');
      await fetch('https://seculo-2.onrender.com/api/bot/stop', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: user.id })
      });
      setTimeout(async () => {
        const response = await fetch('https://seculo-2.onrender.com/api/bot/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: user.id })
        });
        if (response.ok) {
          showMessage('Bot restarted successfully!', 'success');
          getDashboardData();
        } else {
          showMessage('Failed to restart bot', 'error');
        }
      }, 1000);
    };

    window.deleteBot = async function() {
      if (!confirm('Are you sure you want to delete your bot? This cannot be undone.')) return;
      showMessage('Deleting bot...', 'info');
      const response = await fetch('https://seculo-2.onrender.com/api/bot/delete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: user.id })
      });
      const result = await response.json();
      if (response.ok) {
        showMessage('Bot deleted successfully!', 'success');
        getDashboardData();
      } else {
        showMessage(result.error || 'Failed to delete bot', 'error');
      }
    };

    window.logout = async function() {
      await supabase.auth.signOut();
      window.location.href = '/';
    };

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'p-4 rounded-xl mb-6 ' + (type === 'error' ? 'bg-red-500/10 border border-red-500/50 text-red-400' : 'bg-green-500/10 border border-green-500/50 text-green-400');
      msg.classList.remove('hidden');
      setTimeout(() => msg.classList.add('hidden'), 5000);
    }

    checkAuth();
  </script>
</body>
</html>
